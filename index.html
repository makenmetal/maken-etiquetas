<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Etiquetas MKM - MAKEN METAL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{--bg:#f7f7f7;--card:#fff;--border:#ddd;--text:#1a1a1a;--muted:#888;--green:#1a6b3c;--greenbg:#e8f5e9;--orange:#e65100;--orangebg:#fff3e0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);padding:12px 10px;max-width:600px;margin:0 auto}
h2{font-size:18px;margin-bottom:2px}
.sub{color:var(--muted);font-size:12px;margin-bottom:12px}
.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.btn{padding:8px 14px;border:1px solid #aaa;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;background:#f0f0f0}
.btn:active{opacity:0.7}
.btn-sync{background:var(--greenbg)}
.btn-dark{background:#222;color:#fff;border:none}
.btn-green{background:var(--green);color:#fff;border:none;width:100%;padding:12px;font-size:15px;font-weight:700;border-radius:8px;margin-bottom:10px;cursor:pointer}
.btn-green:active{opacity:0.8}
.btn-orange{background:var(--orange);color:#fff;border:none;width:100%;padding:10px;font-size:14px;font-weight:700;border-radius:8px;margin-bottom:10px;cursor:pointer}
.btn-orange:active{opacity:0.8}
.status{font-size:12px;font-weight:600}
.field-label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:2px;display:block}
.inp{width:100%;padding:8px;border:1px solid var(--border);border-radius:6px;font-size:14px}
.card{border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--card)}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-head span{font-weight:700;font-size:14px;color:#333}
.card-head button{background:none;border:none;color:#c00;cursor:pointer;font-size:18px;font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.mb8{margin-bottom:8px}
.peso-badge{background:var(--greenbg);border-radius:6px;padding:8px 12px;text-align:center}
.peso-badge .val{font-size:18px;font-weight:900;color:var(--green)}
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:100%;left:0;right:0;z-index:99;background:#fff;border:1px solid #ccc;border-radius:6px;max-height:250px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.ac-item{padding:10px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #eee}
.ac-item:active,.ac-item:hover{background:#f0f0f0}
.ac-item .detail{color:#888;font-size:11px}
.actions{display:flex;gap:8px;margin-bottom:16px}
.actions button{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.tabs{display:flex;margin-bottom:14px;border-radius:8px;overflow:hidden;border:2px solid #222}
.tab{flex:1;padding:10px;text-align:center;font-weight:700;font-size:14px;cursor:pointer;background:#f0f0f0;color:#333}
.tab.active-prod{background:#222;color:#fff}
.tab.active-urg{background:var(--orange);color:#fff}
.saved-count{background:var(--greenbg);border-radius:6px;padding:8px 12px;text-align:center;margin-bottom:10px;font-size:13px}
.saved-count b{color:var(--green)}
.lbl{width:4in;height:5in;border:1.5px solid #000;font-family:Arial,sans-serif;display:flex;flex-direction:column;background:#fff;color:#000;overflow:hidden;page-break-inside:avoid}
.lbl-logo-bar{border-bottom:2px solid #000;padding:5px 8px;display:flex;align-items:center;justify-content:center}
.lbl-logo-bar img{height:38px}
.lbl-header{display:flex;border-bottom:1.5px solid #000}
.lbl-header-left{flex:1;padding:4px 8px;border-right:1.5px solid #000;line-height:1.25}
.lbl-header-right{flex:1;padding:4px 8px;line-height:1.25}
.lbl-big-row{display:flex;border-bottom:2px solid #000}
.lbl-big-cell{flex:1;padding:6px 8px;text-align:center;border-right:1.5px solid #000}
.lbl-big-cell:last-child{border-right:none}
.lbl-big-label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}
.lbl-big-val{font-weight:900;line-height:1.1}
.lbl-detail-row{display:flex;border-bottom:1.5px solid #000}
.lbl-detail-cell{flex:1;padding:5px 8px;border-right:1.5px solid #000}
.lbl-detail-cell:last-child{border-right:none}
.lbl-detail-label{font-size:8px;color:#666;margin-bottom:1px}
.lbl-footer{display:flex;flex:1}
@media print{
  body{background:#fff;padding:0;max-width:none;margin:0}
  .no-print{display:none!important}
  #printGrid{display:grid!important;grid-template-columns:4in 4in;grid-auto-rows:5in;justify-content:center;align-content:start;column-gap:0.5in;row-gap:0in;width:8.5in;margin:0 auto;padding:0.5in 0in 0in 0in}
  .lbl{border:1.5px solid #000;margin:0;width:4in;height:5in}
  @page{margin:0;size:letter}
}
</style>
</head>
<body>
<div class="no-print">
  <h2>Etiquetas de Empaque</h2>
  <p class="sub">MAKEN METAL S.A. DE C.V.</p>
  <div class="toolbar">
    <button class="btn btn-sync" id="btnSync" onclick="fetchCatalogo()">⟳ Sync</button>
    <span class="status" id="syncStatus" style="color:#666">● Cargando...</span>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active-prod" id="tabProd" onclick="switchTab('prod')">Producción</div>
    <div class="tab" id="tabUrg" onclick="switchTab('urg')">Urgente</div>
  </div>

  <!-- PRODUCCION -->
  <div id="panelProd">
    <div class="saved-count" id="savedCount" style="display:none"></div>
    <div class="mb8">
      <span class="field-label">Fecha</span>
      <input type="date" id="fechaProd" class="inp" style="max-width:180px" onchange="saveProdState()">
    </div>
    <div id="linesProd"></div>
    <div class="actions">
      <button class="btn" style="background:#f5f5f5;border:1px solid #ccc" onclick="addLineProd()">+ Agregar</button>
      <button class="btn btn-dark" id="btnPrevProd" onclick="togglePreviewProd()">Vista previa</button>
    </div>
    <button class="btn-green" id="btnPrintProd" style="display:none" onclick="printLabels('prod')">Imprimir producción</button>
    <button class="btn-orange" id="btnClearProd" style="display:none" onclick="clearProd()">Limpiar sesión</button>
    <div id="previewProd" style="display:none"></div>
  </div>

  <!-- URGENTE -->
  <div id="panelUrg" style="display:none">
    <div style="background:var(--orangebg);border-radius:8px;padding:10px;margin-bottom:12px;font-size:13px;color:var(--orange);font-weight:600;text-align:center">Etiqueta urgente — se limpia al imprimir</div>
    <div class="mb8">
      <span class="field-label">Fecha</span>
      <input type="date" id="fechaUrg" class="inp" style="max-width:180px">
    </div>
    <div id="linesUrg"></div>
    <div class="actions">
      <button class="btn" style="background:#f5f5f5;border:1px solid #ccc" onclick="addLineUrg()">+ Agregar</button>
      <button class="btn btn-dark" id="btnPrevUrg" onclick="togglePreviewUrg()">Vista previa</button>
    </div>
    <button class="btn-green" id="btnPrintUrg" style="display:none" onclick="printLabels('urg')">Imprimir urgente</button>
    <div id="previewUrg" style="display:none"></div>
  </div>
</div>
<div id="previewArea" style="display:none"></div>
<script>
var SHEET_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1JtoJW5D7HZ3pXd4VTGb7Ii5LLWd7LTYMjpl5hP_RYOEN2U5O41gnqSrCGeRKqA/pub?output=csv";
var SHEET_SHIPTO_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vQ1JtoJW5D7HZ3pXd4VTGb7Ii5LLWd7LTYMjpl5hP_RYOEN2U5O41gnqSrCGeRKqA/pub?gid=1896208322&single=true&output=csv";
var LOGO_URL="https://makenmetal.github.io/maken-etiquetas/LOGO-MKM.jpg";
var SHIP_TO={};
var catalogo=[];
var lineId=0;

var prodLines=[];
var urgLines=[];
var prodPrev=false;
var urgPrev=false;
var activeTab="prod";

function mkLine(){lineId++;return{id:lineId,bpoLineId:"",shipTo:"",itemId:"",descripcion:"",ordenTrabajo:"",cantidad:"",pesoUnit:"",copias:"1"};}
function calcPN(pu,c){var a=parseFloat(pu),b=parseFloat(c);return(isNaN(a)||isNaN(b)||b===0)?"":(a*b).toFixed(2);}

function initDates(){
  var today=new Date().toISOString().split("T")[0];
  document.getElementById("fechaProd").value=today;
  document.getElementById("fechaUrg").value=today;
}

// === TABS ===
function switchTab(tab){
  activeTab=tab;
  document.getElementById("panelProd").style.display=tab==="prod"?"block":"none";
  document.getElementById("panelUrg").style.display=tab==="urg"?"block":"none";
  document.getElementById("tabProd").className=tab==="prod"?"tab active-prod":"tab";
  document.getElementById("tabUrg").className=tab==="urg"?"tab active-urg":"tab";
}

// === LOCALSTORAGE ===
function saveProdState(){
  var data={lines:prodLines,fecha:document.getElementById("fechaProd").value};
  localStorage.setItem("mkm_prod",JSON.stringify(data));
  updateSavedCount();
}
function loadProdState(){
  try{
    var raw=localStorage.getItem("mkm_prod");
    if(raw){
      var data=JSON.parse(raw);
      if(data.lines&&data.lines.length>0){
        prodLines=data.lines;
        lineId=0;
        for(var i=0;i<prodLines.length;i++){if(prodLines[i].id>lineId)lineId=prodLines[i].id;}
        document.getElementById("fechaProd").value=data.fecha||new Date().toISOString().split("T")[0];
        return true;
      }
    }
  }catch(e){}
  return false;
}
function clearProd(){
  if(confirm("¿Limpiar toda la sesión de producción?")){
    prodLines=[mkLine()];
    localStorage.removeItem("mkm_prod");
    prodPrev=false;
    document.getElementById("btnPrevProd").textContent="Vista previa";
    document.getElementById("previewProd").style.display="none";
    document.getElementById("btnPrintProd").style.display="none";
    document.getElementById("btnClearProd").style.display="none";
    renderLines("prod");
    updateSavedCount();
  }
}
function updateSavedCount(){
  var filled=prodLines.filter(function(l){return l.itemId.trim()&&l.cantidad.trim();});
  var el=document.getElementById("savedCount");
  var clr=document.getElementById("btnClearProd");
  if(filled.length>0){
    var totalCopies=0;
    for(var i=0;i<filled.length;i++){var cp=parseInt(filled[i].copias)||1;totalCopies+=cp;}
    el.innerHTML='<b>'+filled.length+'</b> producto'+(filled.length>1?'s':'')+' registrado'+(filled.length>1?'s':'')+' — <b>'+totalCopies+'</b> etiqueta'+(totalCopies>1?'s':'')+' pendientes';
    el.style.display="block";
    clr.style.display="block";
  }else{
    el.style.display="none";
    clr.style.display="none";
  }
}

// === FETCH ===
function fetchCatalogo(){
  document.getElementById("syncStatus").innerHTML='<span style="color:#666">● Cargando...</span>';
  document.getElementById("btnSync").disabled=true;
  var done=0;
  function checkDone(){done++;if(done>=2){document.getElementById("btnSync").disabled=false;}}

  Papa.parse(SHEET_SHIPTO_URL,{
    download:true,header:true,skipEmptyLines:true,dynamicTyping:false,
    complete:function(results){
      if(results.data&&results.data.length>0){
        var hd=Object.keys(results.data[0]).map(function(h){return h.trim();});
        SHIP_TO={};
        results.data.forEach(function(row){
          var v=hd.map(function(k){return(row[k]||"").toString().trim();});
          var code=v[0]||"";
          if(code){SHIP_TO[code]={real:v[1]||"",dir:v[2]||"",noProv:v[3]||""};}
        });
      }
      checkDone();
    },
    error:function(){checkDone();}
  });

  Papa.parse(SHEET_URL,{
    download:true,header:true,skipEmptyLines:true,dynamicTyping:false,
    complete:function(results){
      if(results.data&&results.data.length>0){
        var hd=Object.keys(results.data[0]).map(function(h){return h.trim();});
        catalogo=results.data.map(function(row){
          var v=hd.map(function(k){return(row[k]||"").toString().trim();});
          return{bpoLineId:v[0]||"",shipTo:v[1]||"",itemId:v[2]||"",descripcion:v[3]||"",pesoUnit:v[4]||"",loteOptimo:v[5]||""};
        }).filter(function(x){return x.itemId;});
        catalogo.sort(function(a,b){return a.itemId.localeCompare(b.itemId);});
        var t=new Date().toLocaleTimeString();
        document.getElementById("syncStatus").innerHTML='<span style="color:#1a6b3c">● Sheet — '+catalogo.length+' productos | '+Object.keys(SHIP_TO).length+' destinos ('+t+')</span>';
      }else{
        document.getElementById("syncStatus").innerHTML='<span style="color:#c00">● Sin datos</span>';
      }
      checkDone();
    },
    error:function(){
      document.getElementById("syncStatus").innerHTML='<span style="color:#c00">● Error</span>';
      checkDone();
    }
  });
}

// === AUTOCOMPLETE ===
function filterCat(val){
  if(!catalogo.length)return[];
  if(val&&val.trim()){var q=val.toLowerCase();return catalogo.filter(function(c){return(c.itemId||"").toLowerCase().indexOf(q)>=0||(c.descripcion||"").toLowerCase().indexOf(q)>=0||(c.bpoLineId||"").toLowerCase().indexOf(q)>=0;});}
  return catalogo.slice(0,30);
}
function closeDropdowns(){var ds=document.querySelectorAll(".ac-drop");for(var i=0;i<ds.length;i++)ds[i].remove();}

function getLines(mode){return mode==="prod"?prodLines:urgLines;}

function showDropdown(li,mode){
  closeDropdowns();
  var lns=getLines(mode);var ln=lns[li];var filt=filterCat(ln.itemId);if(!filt.length)return;
  var wrap=document.getElementById("ac-"+mode+"-"+ln.id);if(!wrap)return;
  var drop=document.createElement("div");drop.className="ac-drop";
  for(var i=0;i<filt.length;i++){
    (function(idx){
      var it=filt[idx];var d=document.createElement("div");d.className="ac-item";
      d.innerHTML='<b>'+it.itemId+'</b> — '+it.descripcion+'<div class="detail">'+(it.pesoUnit||"?")+ ' kg/pza | '+it.shipTo+' | BPO: '+it.bpoLineId+'</div>';
      d.onclick=function(){
        ln.itemId=it.itemId;ln.descripcion=it.descripcion;ln.pesoUnit=it.pesoUnit;
        ln.shipTo=it.shipTo;ln.bpoLineId=it.bpoLineId;
        if(it.loteOptimo)ln.cantidad=it.loteOptimo;
        closeDropdowns();renderLines(mode);if(mode==="prod")saveProdState();
      };
      drop.appendChild(d);
    })(i);
  }
  wrap.appendChild(drop);
}

function findBpoForItemAndShip(itemId,shipTo){
  if(!itemId||!shipTo||!catalogo.length)return"";
  for(var i=0;i<catalogo.length;i++){
    if(catalogo[i].itemId===itemId&&catalogo[i].shipTo===shipTo)return catalogo[i].bpoLineId;
  }
  return"";
}

function updateField(li,field,val,mode){
  var lns=getLines(mode);
  lns[li][field]=val;
  if(field==="shipTo"){
    var ln=lns[li];
    var found=findBpoForItemAndShip(ln.itemId,val);
    ln.bpoLineId=found;
    var card=document.getElementById("ac-"+mode+"-"+ln.id);
    if(card){var allCards=card.closest(".card");if(allCards){var inputs=allCards.querySelectorAll("input");if(inputs.length>=3)inputs[2].value=found;}}
  }
  if(field==="cantidad"||field==="pesoUnit"){
    var pn2=calcPN(lns[li].pesoUnit,lns[li].cantidad);
    var el=document.getElementById("pn-"+mode+"-"+lns[li].id);
    if(el){if(pn2){el.innerHTML='Peso Neto: <span class="val">'+pn2+' kg</span>';el.style.display="block";}else{el.style.display="none";}}
  }
  if(mode==="prod")saveProdState();
}

function showShipDropdown(li,mode){
  closeDropdowns();
  var lns=getLines(mode);var ln=lns[li];
  var val=(ln.shipTo||"").toLowerCase();
  var keys=Object.keys(SHIP_TO);
  var filt=val?keys.filter(function(k){var s=SHIP_TO[k];return k.toLowerCase().indexOf(val)>=0||(s.real||"").toLowerCase().indexOf(val)>=0;}):keys;
  if(!filt.length)return;
  var wrap=document.getElementById("st-"+mode+"-"+ln.id);if(!wrap)return;
  var drop=document.createElement("div");drop.className="ac-drop";
  for(var i=0;i<filt.length;i++){
    (function(key){
      var s=SHIP_TO[key];var d=document.createElement("div");d.className="ac-item";
      d.innerHTML='<b>'+key+'</b><div class="detail">'+s.real+'</div>';
      d.onclick=function(){
        ln.shipTo=key;ln.bpoLineId=findBpoForItemAndShip(ln.itemId,key);
        closeDropdowns();renderLines(mode);if(mode==="prod")saveProdState();
      };
      drop.appendChild(d);
    })(filt[i]);
  }
  wrap.appendChild(drop);
}

// === LINES ===
function addLineProd(){prodLines.push(mkLine());renderLines("prod");saveProdState();}
function addLineUrg(){urgLines.push(mkLine());renderLines("urg");}
function remLine(li,mode){
  var lns=getLines(mode);
  if(lns.length>1){lns.splice(li,1);renderLines(mode);if(mode==="prod")saveProdState();}
}

function renderLines(mode){
  var lns=getLines(mode);
  var container=document.getElementById("lines"+(mode==="prod"?"Prod":"Urg"));
  var h="";
  for(var i=0;i<lns.length;i++){
    var ln=lns[i];var pn=calcPN(ln.pesoUnit,ln.cantidad);
    h+='<div class="card">';
    h+='<div class="card-head"><span>Linea '+(i+1)+'</span><button onclick="remLine('+i+',\''+mode+'\')">✕</button></div>';
    h+='<div class="mb8"><span class="field-label">Item ID</span><div class="ac-wrap" id="ac-'+mode+'-'+ln.id+'"><input class="inp" value="'+ln.itemId+'" oninput="updateField('+i+',\'itemId\',this.value,\''+mode+'\');showDropdown('+i+',\''+mode+'\')" onfocus="showDropdown('+i+',\''+mode+'\')" placeholder="Buscar Item ID"></div></div>';
    h+='<div class="mb8"><span class="field-label">Descripcion</span><input class="inp" value="'+ln.descripcion+'" oninput="updateField('+i+',\'descripcion\',this.value,\''+mode+'\')"></div>';
    h+='<div class="grid2"><div><span class="field-label">OC (BPO)</span><input class="inp" value="'+ln.bpoLineId+'" oninput="updateField('+i+',\'bpoLineId\',this.value,\''+mode+'\')"></div>';
    h+='<div><span class="field-label">Ship To</span><div class="ac-wrap" id="st-'+mode+'-'+ln.id+'"><input class="inp" value="'+ln.shipTo+'" oninput="updateField('+i+',\'shipTo\',this.value,\''+mode+'\');showShipDropdown('+i+',\''+mode+'\')" onfocus="showShipDropdown('+i+',\''+mode+'\')" placeholder="Buscar destino"></div></div></div>';
    h+='<div class="mb8"><span class="field-label">Orden de Trabajo</span><input class="inp" value="'+ln.ordenTrabajo+'" oninput="updateField('+i+',\'ordenTrabajo\',this.value,\''+mode+'\')"></div>';
    h+='<div class="grid2"><div><span class="field-label">Cantidad (pzas)</span><input class="inp" type="number" value="'+ln.cantidad+'" oninput="updateField('+i+',\'cantidad\',this.value,\''+mode+'\')"></div>';
    h+='<div><span class="field-label">Peso Unit. (kg)</span><input class="inp" style="background:#f0f0f0" value="'+ln.pesoUnit+'" oninput="updateField('+i+',\'pesoUnit\',this.value,\''+mode+'\')"></div></div>';
    h+='<div class="peso-badge" id="pn-'+mode+'-'+ln.id+'" style="display:'+(pn?"block":"none")+'">Peso Neto: <span class="val">'+(pn||"")+' kg</span></div>';
    h+='<div class="mb8" style="margin-top:8px"><span class="field-label">Copias de esta etiqueta</span><input class="inp" type="number" min="1" value="'+(ln.copias||"1")+'" oninput="updateField('+i+',\'copias\',this.value,\''+mode+'\')" style="max-width:80px"></div>';
    h+='</div>';
  }
  container.innerHTML=h;
  if(mode==="prod")updateSavedCount();
}

// === PREVIEW ===
function togglePreviewProd(){
  prodPrev=!prodPrev;
  document.getElementById("btnPrevProd").textContent=prodPrev?"Ocultar":"Vista previa";
  renderPreview("prod");
  document.getElementById("previewProd").style.display=prodPrev?"block":"none";
}
function togglePreviewUrg(){
  urgPrev=!urgPrev;
  document.getElementById("btnPrevUrg").textContent=urgPrev?"Ocultar":"Vista previa";
  renderPreview("urg");
  document.getElementById("previewUrg").style.display=urgPrev?"block":"none";
}

function makeLabel(ln,fecha){
  var pn=calcPN(ln.pesoUnit,ln.cantidad);
  var st=SHIP_TO[ln.shipTo]||{real:ln.shipTo||"—",dir:"",noProv:""};
  var qrData=encodeURIComponent("MKM|"+ln.itemId+"|OC:"+ln.bpoLineId+"|OT:"+ln.ordenTrabajo+"|"+ln.shipTo+"|Q:"+ln.cantidad+"|KG:"+pn+"|"+fecha);
  var qrUrl="https://api.qrserver.com/v1/create-qr-code/?size=90x90&data="+qrData+"&margin=1";

  return '<div class="lbl">'+
    '<div class="lbl-logo-bar"><img src="'+LOGO_URL+'" height="30" alt="MKM"></div>'+
    '<div class="lbl-header">'+
      '<div class="lbl-header-left">'+
        '<div style="font-weight:800;font-size:10px">MAKEN METAL, S.A DE C.V</div>'+
        '<div style="font-size:8px;color:#444">RFC: MME2012015J0</div>'+
        '<div style="font-size:8px;color:#444">Prof. José Rodríguez 1035, Col. Universidad</div>'+
        '<div style="font-size:8px;color:#444">CP 25260, Saltillo, Coahuila</div>'+
      '</div>'+
      '<div class="lbl-header-right">'+
        '<div style="font-weight:800;font-size:10px">'+st.real+'</div>'+

      '</div>'+

        '<div class="lbl-detail-label">Peso Neto</div>'+

}

function renderPreview(mode){
  var lns=getLines(mode);
  var isPrev=mode==="prod"?prodPrev:urgPrev;
  var fecha=document.getElementById(mode==="prod"?"fechaProd":"fechaUrg").value;
  var filled=lns.filter(function(l){return l.itemId.trim()&&l.cantidad.trim();});
  var area=document.getElementById(mode==="prod"?"previewProd":"previewUrg");
  var btn=document.getElementById(mode==="prod"?"btnPrintProd":"btnPrintUrg");
  btn.style.display=(isPrev&&filled.length>0)?"block":"none";
  if(!isPrev)return;
  if(!filled.length){area.innerHTML='<p style="color:#888;font-size:13px;text-align:center;padding:20px">Captura Item ID y cantidad.</p>';return;}
  var allLabels=[];
  for(var i=0;i<filled.length;i++){
    var copies=parseInt(filled[i].copias)||1;if(copies<1)copies=1;if(copies>50)copies=50;
    for(var c=0;c<copies;c++)allLabels.push(makeLabel(filled[i],fecha));
  }
  var joined=allLabels.join("");
  area.innerHTML='<div style="overflow-x:auto"><div style="display:flex;flex-direction:column;gap:8px;align-items:center;min-width:300px">'+joined+'</div></div>';
}

function printLabels(mode){
  var lns=getLines(mode);
  var fecha=document.getElementById(mode==="prod"?"fechaProd":"fechaUrg").value;
  var filled=lns.filter(function(l){return l.itemId.trim()&&l.cantidad.trim();});
  if(!filled.length)return;
  var allLabels=[];
  for(var i=0;i<filled.length;i++){
    var copies=parseInt(filled[i].copias)||1;if(copies<1)copies=1;if(copies>50)copies=50;
    for(var c=0;c<copies;c++)allLabels.push(makeLabel(filled[i],fecha));
  }
  var pw=window.open("","_blank");
  pw.document.write('<!DOCTYPE html><html><head><title>Etiquetas MKM</title><style>');
  pw.document.write('*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif}');
  pw.document.write('.print-grid{display:grid;grid-template-columns:4in 4in;grid-auto-rows:5in;justify-content:center;align-content:start;column-gap:0.5in;row-gap:0in;width:8.5in;margin:0 auto;padding:0.5in 0in 0in 0in}');
  pw.document.write('.lbl{width:4in;height:5in;border:1.5px solid #000;font-family:Arial,sans-serif;display:flex;flex-direction:column;background:#fff;color:#000;overflow:hidden;page-break-inside:avoid}');
  pw.document.write('.lbl-logo-bar{border-bottom:2px solid #000;padding:5px 8px;display:flex;align-items:center;justify-content:center}');
  pw.document.write('.lbl-logo-bar img{height:38px}');
  pw.document.write('.lbl-header{display:flex;border-bottom:1.5px solid #000}.lbl-header-left{flex:1;padding:4px 8px;border-right:1.5px solid #000;line-height:1.25}.lbl-header-right{flex:1;padding:4px 8px;line-height:1.25}');
  pw.document.write('.lbl-big-row{display:flex;border-bottom:2px solid #000}.lbl-big-cell{flex:1;padding:6px 8px;text-align:center;border-right:1.5px solid #000}.lbl-big-cell:last-child{border-right:none}');
  pw.document.write('.lbl-big-label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px}.lbl-big-val{font-weight:900;line-height:1.1}');
  pw.document.write('.lbl-detail-row{display:flex;border-bottom:1.5px solid #000}.lbl-detail-cell{flex:1;padding:5px 8px;border-right:1.5px solid #000}.lbl-detail-cell:last-child{border-right:none}');
  pw.document.write('.lbl-detail-label{font-size:8px;color:#666;margin-bottom:1px}');
  pw.document.write('.lbl-footer{display:flex;flex:1}');
  pw.document.write('@page{margin:0;size:letter}@media print{.print-grid{display:grid!important}}');
  pw.document.write('</style></head><body><div class="print-grid">'+allLabels.join("")+'</div></body></html>');
  pw.document.close();
  setTimeout(function(){pw.print();},800);
  if(mode==="urg"){
    urgLines=[mkLine()];
    urgPrev=false;
    document.getElementById("btnPrevUrg").textContent="Vista previa";
    document.getElementById("previewUrg").style.display="none";
    document.getElementById("btnPrintUrg").style.display="none";
    renderLines("urg");
  }
}

initDates();
if(!loadProdState()){prodLines=[mkLine()];}
urgLines=[mkLine()];
fetchCatalogo();
renderLines("prod");
renderLines("urg");
</script>
